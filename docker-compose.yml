# docker-compose.yml

version: "3.9"

services:

  postgres:
    image: postgres:16-alpine
    container_name: todo_postgres
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - todo_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    # No ports exposed to host — only Nginx talks to Postgres via Docker network.
    # This is a security improvement over the previous setup.

  api:
    build: .
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - .:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - todo_network
    # No ports exposed to host — Nginx is the only entry point.
    # Direct access to :8000 from outside Docker is now blocked.

  nginx:
    image: nginx:alpine
    container_name: todo_nginx
    restart: unless-stopped
    ports:
      - "80:80"       # HTTP (redirects to HTTPS)
      - "443:443"     # HTTPS
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro    # ro = read-only mount
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - api
    networks:
      - todo_network

  pgadmin:
    image: dpage/pgadmin4
    container_name: todo_pgadmin
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "5050:80"
    depends_on:
      - postgres
    networks:
      - todo_network
    volumes:
      - pgadmin_data:/var/lib/pgadmin

volumes:
  postgres_data:
  pgadmin_data:

networks:
  todo_network:
    driver: bridge