# nginx/nginx.conf

# ─── Worker Processes ──────────────────────────────────────────────────────────
# 'auto' = one worker per CPU core. Nginx is multi-process (unlike Node's
# single process). Each worker handles thousands of connections via async I/O.
worker_processes auto;

events {
    # Max simultaneous connections per worker.
    # Total capacity = worker_processes × worker_connections.
    # 1024 is conservative — production configs often use 4096+.
    worker_connections 1024;
}

http {
    # ─── Hide Nginx Identity ────────────────────────────────────────────────────
    # By default, Nginx adds 'Server: nginx/1.25.0' to every response header.
    # This tells attackers exactly what software and version you're running.
    # 'off' sends 'Server: nginx' — still reveals Nginx but not the version.
    # To remove it entirely you need the nginx-extras package or OpenResty.
    server_tokens off;

    # ─── Logging ───────────────────────────────────────────────────────────────
    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log warn;

    # ─── Rate Limiting Zones ────────────────────────────────────────────────────
    # Define shared memory zones for tracking request rates.
    # These live at the http{} level so they're shared across all server blocks.

    # General API rate limit — 10 requests per second per IP
    # 'binary_remote_addr' stores IPs in binary (4 bytes IPv4 vs 15 bytes string) — more efficient
    # 'zone=api_limit:10m' — name this zone 'api_limit', allocate 10MB of shared memory
    # 10MB holds ~160,000 IP addresses — more than enough
    # 'rate=10r/s' — allow 10 requests per second per unique IP
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;

    # Stricter limit for auth-style or write endpoints — 3 requests per second per IP
    limit_req_zone $binary_remote_addr zone=write_limit:10m rate=3r/s;

    # Set the response code when rate limit is hit — 429 Too Many Requests
    # Default is 503 Service Unavailable which is misleading
    limit_req_status 429;

    # ─── Upstream Block (Load Balancing Pool) ──────────────────────────────────
    # 'upstream' defines a named pool of backend servers.
    # Nginx distributes incoming requests across these servers.
    # 'api' is the name — used in proxy_pass below.
    # These hostnames ('api_1', 'api_2', 'api_3') match Docker Compose service
    # names with scaled instance numbers (set via --scale in Compose).
    upstream fastapi_cluster {
        # Default algorithm: round-robin (request 1→server1, 2→server2, 3→server3, repeat)
        # Alternatives (commented out below):

        # least_conn — sends to whichever server has fewest active connections.
        # Better for endpoints with variable response times (some slow DB queries, some fast).
        # least_conn;

        # ip_hash — same IP always goes to same server (session stickiness).
        # Needed if you store session state in memory (not in Redis/DB).
        # Not needed here since FastAPI is stateless.
        # ip_hash;

        server api:8000;
        # When you scale with 'docker compose up --scale api=3',
        # Docker's internal DNS resolves 'api' to all three container IPs
        # and Nginx round-robins across them automatically.
        # No need to list api_1, api_2, api_3 explicitly.
    }

    # ─── HTTP Server (Redirect to HTTPS) ───────────────────────────────────────
    server {
        listen 80;
        server_name localhost;

        # Permanently redirect all HTTP traffic to HTTPS.
        # 301 = permanent redirect — browsers cache this.
        # $host = the Host header from the request.
        # $request_uri = the full path + query string.
        return 301 https://$host$request_uri;
    }

    # ─── HTTPS Server (Main Server Block) ──────────────────────────────────────
    server {
        listen 443 ssl;
        server_name localhost;

        # ── SSL Configuration ─────────────────────────────────────────────────
        ssl_certificate     /etc/nginx/certs/cert.pem;
        ssl_certificate_key /etc/nginx/certs/key.pem;

        # Only allow TLS 1.2 and 1.3 — disable older insecure versions (TLS 1.0, 1.1, SSL)
        ssl_protocols TLSv1.2 TLSv1.3;

        # Strong cipher suites only — controls the encryption algorithms negotiated
        ssl_ciphers HIGH:!aNULL:!MD5;

        # ── Security Headers ──────────────────────────────────────────────────
        # These HTTP response headers instruct browsers on security policy.
        # They cost nothing but protect against entire classes of attacks.

        # Prevent clickjacking — stops your app being embedded in an iframe
        add_header X-Frame-Options "SAMEORIGIN" always;

        # Prevent MIME-type sniffing — browser must respect Content-Type header
        # Blocks attacks where malicious files are disguised as harmless types
        add_header X-Content-Type-Options "nosniff" always;

        # Force HTTPS for 1 year — browser won't even attempt HTTP after first visit
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        # Control what info is sent in the Referer header to other sites
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # Content Security Policy — restrict what resources the browser can load
        # For a pure API this is less critical but good practice
        add_header X-XSS-Protection "1; mode=block" always;

        # ── Request Size Limit ────────────────────────────────────────────────
        # Reject request bodies larger than 10MB at the Nginx level.
        # Protects against payload-based DoS attacks before they reach Python.
        client_max_body_size 10M;

        # ── Timeouts ──────────────────────────────────────────────────────────
        # How long Nginx waits for the client to send the request body
        client_body_timeout 12s;
        # How long to wait for the client to send headers
        client_header_timeout 12s;
        # How long to keep an idle keep-alive connection open
        keepalive_timeout 15s;

        # ── Health Check Endpoint ─────────────────────────────────────────────
        # Expose a lightweight health check directly from Nginx — no FastAPI hit.
        # Load balancers and monitoring tools ping this.
        location /health {
            access_log off;           # Don't log health check noise
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }

        # ── Main API Location ─────────────────────────────────────────────────
        location / {
            # Apply the general rate limit zone defined above.
            # burst=20 — allow a burst of up to 20 queued requests beyond the rate limit.
            #            Think of it as a token bucket — you earn 10 tokens/sec,
            #            can stockpile up to 20, spend them on traffic spikes.
            # nodelay — don't make bursted requests wait; serve them immediately
            #           but count them against the burst allowance.
            #           Without nodelay, burst requests are delayed, not rejected.
            limit_req zone=api_limit burst=20 nodelay;

            # Forward the request to the upstream pool (load balancing happens here)
            proxy_pass http://fastapi_cluster;

            # ── Proxy Headers ──────────────────────────────────────────────────
            # When Nginx forwards requests, the original headers are lost.
            # These lines reconstruct them so FastAPI sees the real client info.

            # Pass the original Host header (not Nginx's internal hostname)
            proxy_set_header Host $host;

            # Pass the real client IP — without this, FastAPI sees Nginx's IP for every request
            proxy_set_header X-Real-IP $remote_addr;

            # Standard header for the full chain of IPs (client → proxy1 → proxy2 → server)
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

            # Tell FastAPI the original protocol was HTTPS
            proxy_set_header X-Forwarded-Proto $scheme;

            # ── Proxy Timeouts ─────────────────────────────────────────────────
            # How long to wait for FastAPI to respond before returning 504 Gateway Timeout
            proxy_read_timeout 30s;
            proxy_connect_timeout 10s;
        }

        # ── Stricter Rate Limit for Write Endpoints ───────────────────────────
        # Override the general limit for POST/PUT/DELETE routes.
        # More restrictive — protects against write-heavy abuse.
        location ~ ^/api/v1/todos/(create|update|delete) {
            limit_req zone=write_limit burst=5 nodelay;
            proxy_pass http://fastapi_cluster;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}